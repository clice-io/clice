name: cross-test

on:
  workflow_call:

env:
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  # === macOS x86_64 (cross from arm64) ===
  build-macos-x64:
    name: build (macos-15, RelWithDebInfo, x86_64-apple-darwin)
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .cache/ccache
          key: macOS-RelWithDebInfo-x86_64-apple-darwin-ccache-${{ github.sha }}
          restore-keys: |
            macOS-RelWithDebInfo-x86_64-apple-darwin-ccache-

      - name: Zero cache stats
        run: pixi run -- ccache --zero-stats || true

      - name: Build
        run: |
          pixi run cmake-config RelWithDebInfo OFF -- \
            "-DCLICE_TARGET_TRIPLE=x86_64-apple-darwin"
          pixi run cmake-build RelWithDebInfo

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-build-x86_64-apple-darwin
          path: |
            build/RelWithDebInfo/bin/
            build/RelWithDebInfo/lib/
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats
        if: always()
        run: pixi run -- ccache --show-stats

  test-macos-x64:
    name: test (macos-15-intel, RelWithDebInfo, x86_64-apple-darwin)
    needs: build-macos-x64
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: test-run

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-build-x86_64-apple-darwin
          path: build/RelWithDebInfo/

      - name: Make binaries executable
        run: chmod +x build/RelWithDebInfo/bin/*

      - name: Unit tests
        timeout-minutes: 5
        run: pixi run -e test-run unit-test RelWithDebInfo

      - name: Integration tests
        timeout-minutes: 20
        run: pixi run -e test-run integration-test RelWithDebInfo

      - name: Smoke tests
        timeout-minutes: 10
        run: pixi run -e test-run smoke-test RelWithDebInfo

  # === Linux aarch64 (cross from x86_64) ===
  build-linux-aarch64:
    name: build (ubuntu-24.04, RelWithDebInfo, aarch64-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: cross-linux-aarch64

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .cache/ccache
          key: Linux-RelWithDebInfo-aarch64-linux-gnu-ccache-${{ github.sha }}
          restore-keys: |
            Linux-RelWithDebInfo-aarch64-linux-gnu-ccache-

      - name: Zero cache stats
        run: pixi run -e cross-linux-aarch64 -- ccache --zero-stats || true

      - name: Build
        run: |
          pixi run -e cross-linux-aarch64 cmake-config RelWithDebInfo OFF -- \
            "-DCLICE_TARGET_TRIPLE=aarch64-linux-gnu"
          pixi run -e cross-linux-aarch64 cmake-build RelWithDebInfo

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-build-aarch64-linux-gnu
          path: |
            build/RelWithDebInfo/bin/
            build/RelWithDebInfo/lib/
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats
        if: always()
        run: pixi run -e cross-linux-aarch64 -- ccache --show-stats

  test-linux-aarch64:
    name: test (ubuntu-24.04-arm, RelWithDebInfo, aarch64-linux-gnu)
    needs: build-linux-aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: test-run

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-build-aarch64-linux-gnu
          path: build/RelWithDebInfo/

      - name: Make binaries executable
        run: chmod +x build/RelWithDebInfo/bin/*

      - name: Unit tests
        timeout-minutes: 5
        run: pixi run -e test-run unit-test RelWithDebInfo

      - name: Integration tests
        timeout-minutes: 20
        run: pixi run -e test-run integration-test RelWithDebInfo

      - name: Smoke tests
        timeout-minutes: 10
        run: pixi run -e test-run smoke-test RelWithDebInfo

  # === Windows aarch64 (cross from x86_64) ===
  build-windows-arm64:
    name: build (windows-2025, RelWithDebInfo, aarch64-pc-windows-msvc)
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: cross-windows-arm64

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: Windows-RelWithDebInfo-aarch64-pc-windows-msvc-ccache-${{ github.sha }}
          restore-keys: |
            Windows-RelWithDebInfo-aarch64-pc-windows-msvc-ccache-

      - name: Zero cache stats
        run: |
          pixi run -e cross-windows-arm64 -- sccache --stop-server || true
          pixi run -e cross-windows-arm64 -- sccache --zero-stats || true
        shell: bash

      - name: Build
        shell: bash
        run: |
          pixi run -e cross-windows-arm64 cmake-config RelWithDebInfo OFF -- \
            "-DCLICE_TARGET_TRIPLE=aarch64-pc-windows-msvc"
          pixi run -e cross-windows-arm64 cmake-build RelWithDebInfo

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-build-aarch64-pc-windows-msvc
          path: |
            build/RelWithDebInfo/bin/
            build/RelWithDebInfo/lib/
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats and stop server
        if: always()
        run: |
          pixi run -e cross-windows-arm64 -- sccache --show-stats
          pixi run -e cross-windows-arm64 -- sccache --stop-server || true
        shell: bash

  test-windows-arm64:
    name: test (windows-11-arm, RelWithDebInfo, aarch64-pc-windows-msvc)
    needs: build-windows-arm64
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: test-run

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-build-aarch64-pc-windows-msvc
          path: build/RelWithDebInfo/

      - name: Unit tests
        timeout-minutes: 5
        run: pixi run -e test-run unit-test RelWithDebInfo

      - name: Integration tests
        timeout-minutes: 20
        run: pixi run -e test-run integration-test RelWithDebInfo

      - name: Smoke tests
        timeout-minutes: 10
        run: pixi run -e test-run smoke-test RelWithDebInfo
