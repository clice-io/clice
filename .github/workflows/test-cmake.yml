name: cmake

on:
  workflow_call:

env:
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Native builds ──────────────────────────────────────────────
          - os: windows-2025
            build_type: RelWithDebInfo
          - os: ubuntu-24.04
            build_type: Debug
          - os: ubuntu-24.04
            build_type: RelWithDebInfo
          - os: macos-15
            build_type: Debug
          - os: macos-15
            build_type: RelWithDebInfo
          # ── Additional platform builds ─────────────────────────────────
          - os: macos-15
            build_type: RelWithDebInfo
            target_triple: x86_64-apple-darwin
          - os: ubuntu-24.04
            build_type: RelWithDebInfo
            target_triple: aarch64-linux-gnu
          - os: windows-11-arm
            build_type: RelWithDebInfo
            target_triple: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '.cache/sccache' || '.cache/ccache' }}
          key: ${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.target_triple || 'native' }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.target_triple || 'native' }}-ccache-

      - name: Zero cache stats
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --stop-server || true
            pixi run -- sccache --zero-stats || true
          else
            pixi run -- ccache --zero-stats || true
          fi
        shell: bash

      - name: Setup QEMU for aarch64 tests
        if: matrix.target_triple == 'aarch64-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static libc6-arm64-cross libstdc++6-arm64-cross
          echo "QEMU_LD_PREFIX=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"

      - name: Build (native)
        if: ${{ !matrix.target_triple }}
        run: pixi run build ${{ matrix.build_type }} ON

      - name: Build (cross-compile)
        if: ${{ matrix.target_triple }}
        shell: bash
        run: |
          pixi run cmake-config ${{ matrix.build_type }} OFF "-DCLICE_ENABLE_TEST=ON -DCLICE_TARGET_TRIPLE=${{ matrix.target_triple }}"
          pixi run cmake-build ${{ matrix.build_type }}

      - name: Unit Test
        run: pixi run unit-test ${{ matrix.build_type }}

      - name: Integration Test
        run: pixi run integration-test ${{ matrix.build_type }}

      - name: Smoke Test
        if: success() || failure()
        run: pixi run smoke-test ${{ matrix.build_type }}

      - name: Print cache stats and stop server
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --show-stats
            pixi run -- sccache --stop-server || true
          else
            pixi run -- ccache --show-stats
          fi
        shell: bash
