name: release llvm

on:
  push:
    branches: [chore/upgrade-llvm-22]
    paths:
      - ".github/workflows/release-llvm.yml"
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID from build-llvm containing LLVM artifacts"
        required: true
        type: string
      llvm_version:
        description: "LLVM version (e.g. 22.1.4)"
        required: true
        type: string

env:
  SOURCE_RUN_ID: ${{ inputs.source_run_id || '27052100922' }}
  LLVM_VERSION: ${{ inputs.llvm_version || '22.1.4' }}

jobs:
  discover:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: x64-linux-gnu-releasedbg.tar.xz
          - os: macos-15
            artifact: arm64-macos-clang-releasedbg.tar.xz
          - os: windows-2025
            artifact: x64-windows-msvc-releasedbg.tar.xz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: package

      - name: Free Disk Space (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -d "/Library/Developer/CoreSimulator" ]; then
            sudo rm -rf /Library/Developer/CoreSimulator
          fi
          XCODE_PATH="$(xcode-select -p)"
          PLATFORMS_DIR="${XCODE_PATH}/Platforms"
          for p in iPhoneOS.platform iPhoneSimulator.platform AppleTVOS.platform AppleTVSimulator.platform WatchOS.platform WatchSimulator.platform XROS.platform XRSimulator.platform; do
            [ -d "${PLATFORMS_DIR}/${p}" ] && sudo rm -rf "${PLATFORMS_DIR}/${p}"
          done
          sudo rm -rf ~/Library/Android /usr/local/share/dotnet /usr/local/share/powershell ~/.ghcup

      - name: Download LLVM artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ env.SOURCE_RUN_ID }}" \
            -n "${{ matrix.artifact }}" -D .llvm-download
          mkdir -p .llvm
          tar -xf ".llvm-download/${{ matrix.artifact }}" -C .llvm
          rm -rf .llvm-download

      - name: Build clice
        shell: bash
        run: |
          pixi run cmake-config RelWithDebInfo ON -- \
            "-DLLVM_INSTALL_PATH=.llvm/build-install"
          pixi run cmake-build RelWithDebInfo

      - name: Discover unused libraries
        shell: bash
        run: |
          python3 scripts/release-llvm.py \
            --action discover \
            --install-dir .llvm/build-install/lib \
            --build-dir build/RelWithDebInfo \
            --manifest pruned-libs.json \
            --skip-pattern "*Tidy*Module*"

      - name: Print prune results
        shell: bash
        run: |
          python3 -c "
          import json
          data = json.load(open('pruned-libs.json'))
          removed = data['removed']
          total = data.get('total_saved_bytes', 0)
          print(f'Libraries prunable: {len(removed)}')
          print(f'Space saved: {total / 1048576:.1f} MB')
          for entry in sorted(removed, key=lambda e: e['size'], reverse=True)[:20]:
              print(f'  {entry[\"size\"] / 1048576:>7.1f} MB  {entry[\"name\"]}')
          "

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: prune-manifest-${{ matrix.os }}
          path: pruned-libs.json

  release:
    needs: discover
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf ~/Library/Android /usr/local/share/dotnet \
            /usr/local/share/powershell ~/.ghcup
          if [ -d "/Library/Developer/CoreSimulator" ]; then
            sudo rm -rf /Library/Developer/CoreSimulator
          fi
          df -h /

      - name: Download prune manifests
        uses: actions/download-artifact@v4
        with:
          pattern: prune-manifest-*
          path: manifests

      - name: Repackage artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/release-llvm.py \
            --action repackage \
            --source-run-id "${{ env.SOURCE_RUN_ID }}" \
            --manifests-dir manifests \
            --output-dir artifacts \
            --max-parallel 3

      - name: Upload to clice-llvm
        env:
          GH_TOKEN: ${{ secrets.UPLOAD_LLVM }}
        run: |
          python3 scripts/upload-llvm.py \
            "${{ env.LLVM_VERSION }}" \
            "clice-io/clice-llvm" \
            "${{ github.run_id }}"

      - name: Save manifest
        uses: actions/upload-artifact@v4
        with:
          name: llvm-manifest-final
          path: artifacts/llvm-manifest.json
          if-no-files-found: error
          compression-level: 0

  update-clice:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: llvm-manifest-final
          path: .

      - name: Update manifest and version
        run: |
          python3 scripts/update-llvm-version.py \
            --version "${{ env.LLVM_VERSION }}" \
            --manifest-src llvm-manifest.json \
            --manifest-dest config/llvm-manifest.json \
            --package-cmake cmake/package.cmake

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ env.LLVM_VERSION }}"
          BRANCH="chore/update-llvm-${VERSION}"
          RELEASE_URL="https://github.com/clice-io/clice-llvm/releases/tag/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add config/llvm-manifest.json cmake/package.cmake
          git commit -m "chore: update LLVM to ${VERSION}"
          git push --force-with-lease origin "${BRANCH}"

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')

          BODY="$(cat <<EOF
          ## Summary
          - Update LLVM prebuilt binaries to version ${VERSION}
          - Updated \`config/llvm-manifest.json\` with new SHA256 hashes
          - Updated \`cmake/package.cmake\` version string

          **Artifacts:** [clice-llvm release](${RELEASE_URL})
          EOF
          )"

          if [[ -n "$EXISTING_PR" ]]; then
            gh pr edit "$EXISTING_PR" --body "$BODY"
            echo "Updated PR #${EXISTING_PR}"
          else
            gh pr create \
              --title "chore: update LLVM to ${VERSION}" \
              --body "$BODY" \
              --base main
          fi
